{% extends "base.html" %}

{% block content %}
  <div class="jumbotron">
    <div class="container text-center">
      <h1>Credits</h1>
    </div>
  </div>

  <div class="container">
    <div class="row">
      <div class="col-md-12">
        <table class="table table-striped">
          <thead>
            <tr>
              <td>
                <b>Contribution</b>
              </td>
            </tr>
          </thead>
          <tbody>
            {% for credit in credits %}
              <tr>
                <td class="align-middle" style="font-size: 1.0em; padding: 15px 20px;">
                  {{ credit.content }}
                </td>
              </tr>
            {% else %}
              <tr>
                <td class="text-center text-muted" style="padding: 20px;">
                  No credits have been awarded yet.
                </td>
              </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
    </div>
  </div>
{% endblock %}
